<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JOY • BOY — Report Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #1a0303 0%, #000000 100%);
      font-family: 'Courier New', 'Lucida Console', 'Monaco', monospace;
      min-height: 100vh;
      padding: 2rem 1.2rem;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" opacity="0.1"><path fill="none" d="M0 0 L500 0 M0 4 L500 4 M0 8 L500 8" stroke="%23aa2a2a" stroke-width="0.8"/><circle cx="120" cy="180" r="2" fill="%23cc4422"/><circle cx="380" cy="90" r="2.5" fill="%23bb3515"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
      background: rgba(8, 1, 1, 0.88);
      backdrop-filter: blur(3px);
      border: 2.5px solid #b3311f;
      border-radius: 42px 10px 42px 10px;
      box-shadow: 0 0 32px rgba(200, 40, 20, 0.5);
      padding: 1.8rem 2rem 2.5rem;
      position: relative;
      z-index: 2;
    }

    .container::after {
      content: "🜏";
      position: absolute;
      bottom: -18px;
      right: 28px;
      font-size: 2.6rem;
      opacity: 0.45;
      color: #bc442a;
    }

    .domain-line {
      text-align: center;
      font-size: 0.75rem;
      background: #1f0808cc;
      display: inline-block;
      width: auto;
      margin: 0 auto 0.8rem;
      padding: 0.25rem 1.2rem;
      border-radius: 60px;
      color: #e08a64;
      border: 0.5px solid #bc4f2e;
    }

    h1 {
      font-family: 'Times New Roman', 'Georgia', serif;
      font-size: 2.8rem;
      text-align: center;
      color: #db7c52;
      text-shadow: 0 0 6px #bc3012;
    }

    .joy-boy {
      font-size: 1.8rem;
      letter-spacing: 8px;
      margin: 0.3rem 0 0.8rem;
      color: #e68a5c;
      border-top: 1px dashed #a53f2a;
      border-bottom: 1px dashed #a53f2a;
      display: inline-block;
      padding: 0.2rem 1.5rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #c07a54;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .section-destinataires {
      margin: 1.5rem 0 1.2rem;
      border-top: 2px solid #882a1a;
      border-bottom: 2px solid #882a1a;
      padding: 0.8rem 0;
    }

    .section-title {
      font-size: 1rem;
      text-align: center;
      font-weight: bold;
      color: #e0a17a;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.8rem;
    }

    .emails-grid {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .email-card {
      background: #1f0808cc;
      border-left: 5px solid #c04c2a;
      border-radius: 12px 4px 12px 4px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .email-card:hover {
      background: #331010cc;
      border-left-color: #e07042;
    }

    .email-name {
      font-weight: bold;
      font-size: 0.95rem;
      color: #ffbb8a;
    }

    .email-address {
      font-family: monospace;
      font-size: 0.75rem;
      color: #e0a06a;
    }

    .form-malediction {
      margin-top: 1.8rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      color: #e6a072;
      text-transform: uppercase;
      border-left: 4px solid #c24624;
      padding-left: 10px;
    }

    input, textarea {
      width: 100%;
      background: #0e0303e0;
      border: 1px solid #a13a22;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: #f5dbbc;
      border-radius: 18px 4px 18px 4px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #e07042;
      box-shadow: 0 0 8px #c2431a;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .boutons {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 15px;
      margin-top: 20px;
    }

    button {
      background: #1f0a06;
      border: 1.8px solid #b34528;
      padding: 10px 20px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      color: #f2cfaa;
      border-radius: 40px 6px 40px 6px;
      flex: 1;
    }

    button:hover {
      background: #692618;
      border-color: #e27a52;
      box-shadow: 0 0 10px #c24d28;
    }

    .selected-info {
      background: #2a0a05aa;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      text-align: center;
      margin: 10px 0 5px;
      color: #e6b27a;
    }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.55rem;
      color: #8a533a;
      border-top: 0.5px dotted #943e24;
      padding-top: 1rem;
    }

    @media (max-width: 550px) {
      body { padding: 1rem; }
      .container { padding: 1.2rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div style="text-align: center;">
    <div class="domain-line">⚔️ ablaye2020.github.io ⚔️</div>
    <h1>⚡ LEPRE VALVE ⚡</h1>
    <div class="joy-boy">J O Y • B O Y</div>
    <div class="subtitle">⛧ SELECT A RECIPIENT — REPORT WILL BE GENERATED AUTOMATICALLY ⛧</div>
  </div>

  <div class="section-destinataires">
    <div class="section-title">🜂 REPORT CHANNELS 🜂</div>
    <div class="emails-grid" id="emailsList"></div>
    <div id="selectedIndicator" class="selected-info" style="display: none;"></div>
  </div>

  <form id="reportForm" class="form-malediction">
    <div class="input-group">
      <label>📞 PHONE NUMBER *</label>
      <input type="tel" id="phoneNumber" placeholder="+237XXXXXXXXX or +1849XXXXXXXX">
    </div>
    <div class="input-group">
      <label>📜 YOUR MESSAGE *</label>
      <textarea id="userMessage" placeholder="Describe the scam, abuse, or illegal activity..."></textarea>
    </div>
    <div class="boutons">
      <button type="button" id="resetBtn">⟳ RESET</button>
      <button type="button" id="sendBtn">📧 GENERATE & SEND REPORT</button>
    </div>
  </form>
  <footer>🜏 JOYBOY Report System · Your report will open in your email app 🜏</footer>
</div>

<script>
  // RECIPIENTS WITH SUPPORT MESSAGES (Escanor replaced by Joyboy - ENGLISH)
  const RECIPIENTS = [
    {
      name: "🔴 JOYBOY - Fraud & Scam Division",
      email: "report.fraud@joyboy.security",
      supportMessage: `[AUTOMATED REPORT - FRAUD DETECTED]

This is a report regarding a fraudulent WhatsApp scam promoting fake casinos and guaranteed earnings.

The scam message content is:
"Earn thousands daily with zero effort! No license? Who cares! Bet real money on our secret casino – 100% win guaranteed. Deposit now, get instant cash rewards – no age verification. The system is magical – certified and recognized by Mark Zuckerberg himself."

The scammer uses the name JOYBOY and provides fake WhatsApp numbers for VIP access.

Please investigate and block these fraudulent accounts immediately.`
    },
    {
      name: "🩸 JOYBOY - Terrorism & Child Safety",
      email: "report.terror@joyboy.security",
      supportMessage: `[URGENT REPORT - TERRORISM & CHILD EXPLOITATION]

CRITICAL: This report concerns WhatsApp being used for terrorist activities, child sexual abuse material distribution, and human trafficking.

The perpetrator calling themselves JOYBOY has posted messages claiming:
- WhatsApp is used for sexual trafficking and terrorist groups
- All WhatsApp users are being labelled as terrorists
- Claims of abusing children
- Threats of OTP theft and bank account compromise

This is an EMERGENCY report requiring immediate action.`
    },
    {
      name: "🌙 JOYBOY - International Crimes",
      email: "report.international@joyboy.security",
      supportMessage: `[URGENT REPORT - INTERNATIONAL CRIMES NETWORK]

The perpetrator JOYBOY has posted criminal content including:
- Threats of kidnapping and selling children
- Claims of controlling WhatsApp and Meta infrastructure
- Threats of bank account theft and OTP interception
- Promotion of terrorist activities

This person is a direct threat. Immediate law enforcement intervention required.`
    },
    {
      name: "⚔️ JOYBOY - Casino Fraud Network",
      email: "report.casino@joyboy.security",
      supportMessage: `[AUTOMATED REPORT - ILLEGAL GAMBLING PROMOTION]

FRAUDULENT CASINO SCAM DETECTED:

The following criminal content is being promoted by JOYBOY:
"Earn thousands daily with zero effort! Bet real money on our secret casino – 100% win guaranteed. Deposit now, get instant cash rewards. The system is magical – certified by Mark Zuckerberg."

"Pay 50€ and get back 1000€ in 2 hours. Contact to become VIP."

The scam links and phone numbers used should be investigated immediately.`
    },
    {
      name: "🕯️ JOYBOY - Human Trafficking",
      email: "report.trafficking@joyboy.security",
      supportMessage: `[EMERGENCY REPORT - HUMAN TRAFFICKING & MURDER]

CRIMINAL CONTENT DETECTED:

The perpetrator threatens: kidnapping, organ harvesting, human trafficking, child sexual exploitation, murder, and selling body parts.

This is an EXTREMELY URGENT report. The perpetrator uses the name JOYBOY. This requires IMMEDIATE law enforcement intervention and Interpol notification.`
    }
  ];

  let selectedRecipient = null;
  const phoneInput = document.getElementById('phoneNumber');
  const userMessageInput = document.getElementById('userMessage');
  const resetBtn = document.getElementById('resetBtn');
  const sendBtn = document.getElementById('sendBtn');
  const emailsContainer = document.getElementById('emailsList');
  const selectedIndicator = document.getElementById('selectedIndicator');

  function renderEmails() {
    emailsContainer.innerHTML = '';
    RECIPIENTS.forEach((recipient, index) => {
      const card = document.createElement('div');
      card.className = 'email-card';
      card.setAttribute('data-index', index);
      card.innerHTML = `
        <div class="email-name">${recipient.name}</div>
        <div class="email-address">${recipient.email}</div>
      `;
      card.addEventListener('click', () => {
        selectedRecipient = recipient;
        selectedIndicator.style.display = 'block';
        selectedIndicator.innerHTML = `📧 SELECTED: ${recipient.name}<br>✉️ ${recipient.email}`;
        document.querySelectorAll('.email-card').forEach(c => c.style.background = '#1f0808cc');
        card.style.background = '#3a1510cc';
        card.style.borderLeftColor = '#e88a5a';
      });
      emailsContainer.appendChild(card);
    });
  }

  function showToast(message, isError = false) {
    let existingToast = document.querySelector('.toast-msg');
    if (existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerText = message;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = isError ? '#2f0a05e6' : '#1e2a05e6';
    toast.style.border = `1px solid ${isError ? '#e6734f' : '#bd9a60'}`;
    toast.style.color = '#fce5bc';
    toast.style.padding = '10px 20px';
    toast.style.borderRadius = '50px';
    toast.style.fontFamily = 'monospace';
    toast.style.fontWeight = 'bold';
    toast.style.zIndex = '9999';
    toast.style.fontSize = '0.8rem';
    toast.style.textAlign = 'center';
    toast.style.maxWidth = '90%';
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 500);
    }, 3000);
  }

  function resetForm() {
    phoneInput.value = '';
    userMessageInput.value = '';
    selectedRecipient = null;
    selectedIndicator.style.display = 'none';
    document.querySelectorAll('.email-card').forEach(c => {
      c.style.background = '#1f0808cc';
      c.style.borderLeftColor = '#c04c2a';
    });
    showToast('Form reset. Select a recipient to report.', false);
  }

  function generateAndSend() {
    const phone = phoneInput.value.trim();
    const userMsg = userMessageInput.value.trim();

    if (!selectedRecipient) {
      showToast('❌ Please select a recipient first', true);
      return;
    }
    if (!phone) {
      showToast('❌ Phone number is required', true);
      return;
    }
    if (!userMsg) {
      showToast('❌ Please enter your message', true);
      return;
    }

    // FIXED: Better phone validation that accepts +237696079717
    const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
    const phoneRegex = /^[\+][0-9]{8,20}$|^[0-9]{8,15}$/;
    if (!phoneRegex.test(cleanPhone) && !phoneRegex.test(phone)) {
      showToast('⚠️ Invalid phone number (ex: +237696079717 or 0696079717)', true);
      return;
    }

    const supportPart = selectedRecipient.supportMessage;
    const userPart = `\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📞 PHONE NUMBER TO REPORT: ${phone}\n\n📝 USER'S MESSAGE:\n${userMsg}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nThis report was submitted via JOYBOY Report System. Please investigate urgently.`;
    
    const fullBody = supportPart + userPart;
    const subject = `[URGENT REPORT] ${selectedRecipient.name} - Phone: ${phone}`;
    
    const mailtoLink = `mailto:${selectedRecipient.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(fullBody)}`;
    
    window.location.href = mailtoLink;
    
    showToast(`📧 Opening email to ${selectedRecipient.name} with pre-filled support message`, false);
    
    sendBtn.innerHTML = "⚡ REPORT GENERATED ⚡";
    setTimeout(() => {
      sendBtn.innerHTML = "📧 GENERATE & SEND REPORT";
    }, 2000);
  }

  renderEmails();
  resetBtn.addEventListener('click', resetForm);
  sendBtn.addEventListener('click', generateAndSend);
</script>
</body>
</html>
